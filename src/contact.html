<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="News about the progress of web api development, as well as a platform to commission my services.">
        <meta name="keywords" content="news updates css html javascript development">
        <meta name="author" content="Jemma Starecki">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!-- Page Icon: https://www.svgrepo.com/svg/530444/availability -->
        <link rel="icon" type="image/x-icon" href="assets/favicon.svg">
		<title>Jemma Starecki's Web Design Boutique | Homepage</title>

        <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=favorite,home,search,settings"> -->

        <link rel="stylesheet" href="style/main.css">

        <script src="script/jquery-4.0.0.min.js"></script>
    </head>
    <body>
        <header>
            <!-- https://stock.adobe.com/search?k=%2522web%2Bdesign%2Blogo%2522&asset_id=85732813 -->
            <img src="assets/img/adobestock_webdesign_logo.jpg" alt="Jemma Starecki Web Design Boutique Logo" title="Website Logo" id="websiteLogo" class="thumbnail">
            <nav aria-label="Primary">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="updates.html">Updates</a></li>
                    <li><a href="#" aria-current="page">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main id="main">
            <section class="container" id="contact-page">
                <h1>Contact</h1>
                <form action="#" method="post" id="contact-form">
                    <fieldset>
                        <label>
                            First Name
                            <input
                                type="text"
                                name="fname"
                                placeholder="First Name"
                                autofocus
                                required
                            >
                        </label>

                        <label>
                            Last Name
                            <input
                                type="text"
                                name="lname"
                                id="lname"
                                placeholder="Last Name"
                                required
                            >
                        </label>
                    </fieldset>

                    <fieldset>
                        <label>
                            Phone Number
                            <input
                                type="tel"
                                name="phone"
                                placeholder="+1 (123) 456 789"
                                pattern="^\+\d{1,3}(?: ?\(\d{3}\)| \d{3})([ -])\d{3}\1\d{4}$"
                                required
                            >
                        </label>

                        <label>
                            Email
                            <input
                                type="email"
                                name="email"
                                placeholder="name@domain.com"
                                pattern="^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"
                                required
                            >
                        </label>
                    </fieldset>


                    <fieldset>
                        <label class="dbl">
                            Subject
                            <input
                                type="text"
                                name="subject"
                                placeholder="Subject"
                                required
                            >
                        </label>
                    </fieldset>

                    <fieldset>
                        <label class="dbl">
                            Body
                            <textarea
                                name="body"
                                placeholder="Write your message here..."
                                rows="24"
                                required
                            ></textarea>
                        </label>
                    </fieldset>

                    <fieldset>
                        <legend>Inquiry Type</legend>

                        <label class="sel-btn">
                            <input
                                type="radio"
                                name="inquiry"
                                value="general"
                                required
                            >
                            General Question
                        </label>

                        <label class="sel-btn">
                            <input
                                type="radio"
                                name="inquiry"
                                value="commision"
                            >
                            Commission Request
                        </label>
                    </fieldset>

                    <fieldset>
                        <legend>Contact Preferences</legend>

                        <label class="sel-btn">
                            <input
                                type="checkbox"
                                name="pref_email"
                                value="yes"
                            >
                            Contact me by email
                        </label>

                        <label class="sel-btn">
                            <input
                                type="checkbox"
                                name="pref_phone"
                                value="yes"
                            >
                            Contact me by phone
                        </label>
                    </fieldset>

                    <fieldset>
                        <button type="reset" class="button secondary">Reset</button>
                        <button type="submit" class="button primary">Send Message</button>
                    </fieldset>
                </form>
            </section>
        </main>

        <footer>
            <span class="copyright">Jemma Starecki</span>
        </footer>

        <script src="script/script.js"></script>
    </body>
</html>
